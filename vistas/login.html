<div class="contenedor-principal-login">
	<div class="contenedor3">
		<img id="logo-login" src="imagenes/logo.png">

		<label id="texto-iniciar-sesion">Iniciar Sesión</label>

		<label id="info" class="label-info-login" style="visibility: hidden;"></label>

		<div id="credenciales">
			<div class="form-group-login">
				<i class="fas fa-user usuario-login"></i>
				<input class="input-control" id="dni" name="dni" type="text"
					pattern="([0-9]{8}[A-Za-z])|([XYZxyz][0-9]{7}[A-Za-z])"
					title="Introduce 8 números y 1 letra (DNI) o Letra X,Y,Z, 7 números y 1 letra (NIE)" minlength="9"
					maxlength="9" style="text-transform: uppercase;" required autofocus placeholder="DNI / NIE">
			</div>

			<div class="form-group-login">
				<i class="fas fa-lock candado-login"></i>
				<input type="password" class="input-control" id="password" name="password" placeholder="Contraseña"
					required autocomplete="off">
			</div>
		</div>

		<div id="contenedor-recordar">
			<input type="checkbox" id="recordar" name="recordar" value='0'>Mantener sesión iniciada durante 30 días
		</div>

		<button class="boton-principal" id="boton1" type="button" onclick="envio_datos();">
			Iniciar Sesión
		</button>
	</div>
</div>
